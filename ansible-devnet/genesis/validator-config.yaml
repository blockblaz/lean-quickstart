# 8-subnet ansible devnet — homogeneous clients (one client family per subnet).
#
# Genesis order = YAML list order → validator_index = row index (0..63).
# attestation_committee_count: 8 → subnet = index % 8.
# Row pattern repeats zeam → ethlambda → ream → zeam → ethlambda → gean → ream → grandine
# (former qlean/lantern slots are zeam_8..15 and ethlambda_8..15).
# Aggregators: one per committee subnet (validator_index % 8); each on Aggregator_servers IP.
# Subnet → node (only these have isAggregator: true):
#   0 zeam_8 @ 178.105.22.187   1 ethlambda_8 @ 178.105.124.135   2 ream_0 @ 178.105.117.56
#   3 zeam_4 @ 178.105.121.214   4 ethlambda_5 @ 178.105.22.193   5 gean_0 @ 178.105.70.184
#   6 ream_13 @ 178.105.102.228   7 grandine_0 @ 178.105.113.166
#
# Regular validators use IPs from lean_ethereum_servers.txt (Validator_servers).
# Aggregators use dedicated Aggregator_servers: exactly one container per IP
# (quic 9001, api 5055, metrics 9102). No regular validators on those hosts.
# Tooling host (46.225.10.32) is not used.
#
# Ports (per IP): up to four processes per host — quic 9001..9004, api 5055..5058,
# metrics 9102..9105. Avoid observability TCP ports on ansible hosts: 9090 prometheus,
# 9080 promtail, 9098 cadvisor, 9100 node_exporter.
