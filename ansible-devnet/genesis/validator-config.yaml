shuffle: roundrobin
# devnet-4 layout: 2 subnets × 8 clients each. One of every unique client type
# (zeam, ream, qlean, lantern, grandine, ethlambda, gean, nlean) per subnet.
# One validator per server (default ports 9001 / 9095 / 5055). Aggregator per
# subnet is chosen randomly at launch by spin-node.sh (all isAggregator: false).
