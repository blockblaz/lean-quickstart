---
# 8GiB Hetzner host (ubuntu-8gb-fsn1-1): three validators in validator-config.yaml
# cannot use the default 16GiB limits without kernel OOM.
docker_memory_limits:
  zeam: "3g"
  ream: "3g"
  ethlambda: "3g"
  gean: "3g"
  nlean: "3g"
  qlean: "3g"
  lantern: "3g"
  grandine: "3g"
  lighthouse: "3g"
  peam: "3g"
