---
# Global variables for all nodes
#
# Parallel runs: ansible/ansible.cfg sets strategy=free and forks=25 as fallback when
# no -f is passed. run-ansible.sh and ansible-deploy.sh set -f from unique enrFields.ip
# in validator-config (clamped by LEAN_ANSIBLE_FORKS_MIN / LEAN_ANSIBLE_FORKS_MAX).
# Override forks: ANSIBLE_FORKS=100 or ansible-playbook -f 100 ...

# Paths (relative to playbook execution directory or absolute)
network_dir: "{{ playbook_dir }}/../local-devnet"
genesis_dir: "{{ network_dir }}/genesis"
data_dir: "{{ network_dir }}/data"
validator_config_file: "{{ genesis_dir }}/validator-config.yaml"

# Remote paths (for remote deployments)
# Use standard paths on remote hosts
remote_genesis_dir: "/opt/lean-quickstart/genesis"
remote_data_dir: "/opt/lean-quickstart/data"

# Docker settings
docker_with_sudo: false
docker_network_mode: host

# Restart node/observability containers after OOM kill or crash (Docker exit != 0).
# Applied on --prepare (host config) and in docker run on deploy.
docker_container_restart_policy: unless-stopped

# Keep the Docker daemon running if systemd stops it (host-level).
docker_systemd_restart: always

# Per-client cgroup memory caps (issue: ream was ~15GiB RSS on 16GiB hosts → kernel OOM).
# --memory-swap matches --memory so containers cannot expand into swap and evict neighbors.
# Budget for 16GiB host: observability ~0.3GiB + up to 3 validators per IP.
docker_memory_limits:
  zeam: "4g"
  ream: "5g"
  ethlambda: "1536m"
  gean: "3g"
  nlean: "3g"
  qlean: "3g"
  lantern: "3g"
  grandine: "3g"
  lighthouse: "3g"
  peam: "3g"

# Node deployment mode: 'docker' or 'binary'
deployment_mode: docker

# Clean data before deployment
clean_data: false

# Node execution settings
popup_terminal: false

