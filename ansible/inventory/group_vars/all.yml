---
# Global variables for all nodes
#
# Parallel runs: ansible/ansible.cfg sets strategy=free and forks=25 as fallback when
# no -f is passed. run-ansible.sh and ansible-deploy.sh set -f from unique enrFields.ip
# in validator-config (clamped by LEAN_ANSIBLE_FORKS_MIN / LEAN_ANSIBLE_FORKS_MAX).
# Override forks: ANSIBLE_FORKS=100 or ansible-playbook -f 100 ...

# Paths (relative to playbook execution directory or absolute)
network_dir: "{{ playbook_dir }}/../local-devnet"
genesis_dir: "{{ network_dir }}/genesis"
data_dir: "{{ network_dir }}/data"
validator_config_file: "{{ genesis_dir }}/validator-config.yaml"

# Remote paths (for remote deployments)
# Use standard paths on remote hosts
remote_genesis_dir: "/opt/lean-quickstart/genesis"
remote_data_dir: "/opt/lean-quickstart/data"

# Docker settings
docker_with_sudo: false
docker_network_mode: host

# Restart node/observability containers after OOM kill or crash (Docker exit != 0).
# Applied on --prepare (host config) and in docker run on deploy.
docker_container_restart_policy: unless-stopped

# Keep the Docker daemon running if systemd stops it (host-level).
docker_systemd_restart: always

# Per-client cgroup memory caps for shared (non-aggregator) hosts.
# Aggregators are exempt: each role skips --memory/--memory-swap when
# its `*_is_aggregator` fact is "true" (one container per IP, no
# co-tenant pressure). Budget for 16GiB shared host: observability
# ~0.3GiB + up to 3 validators per IP × 4GiB cap = ~12.3GiB worst case.
# --memory-swap matches --memory so containers cannot expand into swap
# and evict neighbors.
docker_memory_limits:
  zeam: "4g"
  ream: "4g"
  ethlambda: "4g"
  gean: "4g"
  nlean: "4g"
  qlean: "4g"
  lantern: "4g"
  grandine: "4g"
  lighthouse: "4g"
  peam: "4g"

# zeam --rayon-threads override for the multisig (XMSS) aggregate prover
# (zeam #903 / #899). Mirror of the ZEAM_RAYON_THREADS_AGGREGATOR /
# ZEAM_RAYON_THREADS env vars in client-cmds/zeam-cmd.sh.
#
# zeam_rayon_threads_aggregator wins for aggregators; zeam_rayon_threads
# applies to both roles otherwise. Both empty (the default) means no flag
# is passed and zeam picks its compiled-in auto-split.
#
# 16-vCPU recommended starting point: 12 (= cpu_count - 4 reserved system
# threads). Do not exceed cpu_count - 4, or libxev/libp2p/api/metrics
# threads start to starve — watch
# `zeam_fork_choice_tick_interval_duration_seconds` p99.
#
# REQUIRES: a zeam image built from PR #903 or later. Older images will
# refuse `--rayon-threads` and fail to start; leave both empty in that case.
zeam_rayon_threads_aggregator: "12"
zeam_rayon_threads: ""

# Node deployment mode: 'docker' or 'binary'
deployment_mode: docker

# Clean data before deployment
clean_data: false

# Node execution settings
popup_terminal: false

