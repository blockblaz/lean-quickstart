---
# Prepare playbook: Verify and install the software required to run lean nodes.
#
# Three things are needed on every remote server:
#
#   1. python3       — Ansible requires Python on managed nodes before any task
#                      can run. It cannot self-bootstrap this.
#   2. Docker CE     — every node client (zeam, ream, qlean, lantern, lighthouse,
#                      grandine, ethlambda) and the full observability stack run as
#                      Docker containers. The Compose plugin is required for the
#                      metrics stack. Docker's systemd service must be running.
#   3. yq            — the common role (which runs at every deploy) hard-fails if
#                      `yq --version` is not available on the remote host.
#
# Everything else is either present on a stock Debian/Ubuntu server or is
# installed automatically as a side-effect of the Docker apt repository setup.
#
# Usage (via spin-node.sh):
#   ./spin-node.sh --prepare [--sshKey ~/.ssh/id_ed25519] [--useRoot]
#
# Only runs on remote hosts (localhost is excluded).

- name: Prepare remote servers
  hosts: all:!localhost
  gather_facts: yes

  tasks:

    # ──────────────────────────────────────────────────────────────────────────
    # 1. python3 — must already be present; Ansible cannot install it itself
    # ──────────────────────────────────────────────────────────────────────────

    - name: Check python3 is available
      command: python3 --version
      register: python3_check
      changed_when: false
      failed_when: false

    - name: Fail early if python3 is missing
      fail:
        msg: >-
          python3 is not installed on {{ inventory_hostname }}.
          Install it manually (e.g. apt install python3) before running --prepare.
      when: python3_check.rc != 0

    # ──────────────────────────────────────────────────────────────────────────
    # 2. Docker CE + Compose plugin
    # ──────────────────────────────────────────────────────────────────────────

    - name: Check if docker is already installed
      command: which docker
      register: docker_pre
      changed_when: false
      failed_when: false

    - name: Install Docker CE (Debian/Ubuntu)
      when:
        - ansible_os_family == "Debian"
        - docker_pre.rc != 0
      block:
        - name: Install apt prerequisites for Docker repository
          apt:
            name:
              - ca-certificates
              - curl
              - gnupg
              - lsb-release
            state: present
            update_cache: yes
          become: yes

        - name: Create /etc/apt/keyrings directory
          file:
            path: /etc/apt/keyrings
            state: directory
            mode: '0755'
          become: yes

        - name: Download Docker GPG key
          get_url:
            url: "https://download.docker.com/linux/{{ ansible_distribution | lower }}/gpg"
            dest: /etc/apt/keyrings/docker.asc
            mode: '0644'
            force: no
          become: yes

        - name: Add Docker apt repository
          apt_repository:
            repo: >-
              deb [arch={{ 'amd64' if ansible_architecture == 'x86_64' else 'arm64' }}
              signed-by=/etc/apt/keyrings/docker.asc]
              https://download.docker.com/linux/{{ ansible_distribution | lower }}
              {{ ansible_distribution_release }} stable
            state: present
            filename: docker
          become: yes

        - name: Install Docker packages
          apt:
            name:
              - docker-ce
              - docker-ce-cli
              - containerd.io
              - docker-compose-plugin
            state: present
            update_cache: yes
          become: yes

    - name: Ensure Docker service is started and enabled
      systemd:
        name: docker
        state: started
        enabled: yes
      become: yes
      when: ansible_os_family == "Debian"

    # ──────────────────────────────────────────────────────────────────────────
    # 3. yq — the common role hard-fails at every deploy if this is absent
    # ──────────────────────────────────────────────────────────────────────────

    - name: Check if yq is already installed
      command: which yq
      register: yq_pre
      changed_when: false
      failed_when: false

    - name: Install yq binary
      when: yq_pre.rc != 0
      block:
        - name: Resolve architecture suffix for yq
          set_fact:
            yq_arch: "{{ 'amd64' if ansible_architecture == 'x86_64' else 'arm64' }}"

        - name: Download yq from GitHub releases
          get_url:
            url: "https://github.com/mikefarah/yq/releases/latest/download/yq_linux_{{ yq_arch }}"
            dest: /usr/local/bin/yq
            mode: '0755'
            force: no
          become: yes

    # ──────────────────────────────────────────────────────────────────────────
    # 4. Verification summary
    # ──────────────────────────────────────────────────────────────────────────

    - name: Verify all required tools
      command: "{{ item.cmd }}"
      register: verify_results
      loop:
        - { name: "python3",        cmd: "python3 --version" }
        - { name: "docker",         cmd: "docker --version" }
        - { name: "docker compose", cmd: "docker compose version" }
        - { name: "yq",             cmd: "yq --version" }
      changed_when: false
      failed_when: false
      loop_control:
        label: "{{ item.name }}"

    - name: Print per-tool status
      debug:
        msg: >-
          [{{ inventory_hostname }}]
          {{ item.item.name }}:
          {{ '✅  ' + (item.stdout_lines[0] | default('ok')) if item.rc == 0
             else '❌  NOT AVAILABLE (exit ' + (item.rc | string) + ')' }}
      loop: "{{ verify_results.results }}"
      loop_control:
        label: "{{ item.item.name }}"

    - name: Fail if any required tool is still missing
      fail:
        msg: >-
          Required tool '{{ item.item.name }}' is not available on
          {{ inventory_hostname }} after preparation. Check the output above.
      loop: "{{ verify_results.results }}"
      loop_control:
        label: "{{ item.item.name }}"
      when: item.rc != 0
