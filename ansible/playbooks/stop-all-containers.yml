---
# Stop every Docker container on each unique validator host IP, except the
# per-host observability stack (prometheus, promtail, cadvisor, node_exporter).
# Uses hosts-prepare.yml (one play per physical host).
#
# This is intentionally not limited to validator names from validator-config.yaml:
# any container on the host is removed unless it is part of the observability stack.

- name: Stop non-observability containers on all validator hosts
  hosts: prepare_hosts
  gather_facts: no
  vars:
    observability_containers:
      - prometheus
      - promtail
      - cadvisor
      - node_exporter

  tasks:
    - name: List all Docker container names
      command: docker ps -a --format '{{ "{{" }}.Names{{ "}}" }}'
      register: all_containers
      changed_when: false

    - name: Stop and remove every container except observability stack
      command: docker rm -f {{ item }}
      loop: "{{ all_containers.stdout_lines | difference(observability_containers) | select('length') | list }}"
      register: stop_result
      failed_when: false

    - name: Report removed containers
      debug:
        msg: "Removed on {{ inventory_hostname }} ({{ ansible_host }}): {{ stop_result.results | selectattr('rc', 'defined') | selectattr('rc', 'equalto', 0) | map(attribute='item') | list | join(', ') }}"
      when:
        - stop_result.results is defined
        - stop_result.results | selectattr('rc', 'defined') | selectattr('rc', 'equalto', 0) | list | length > 0
