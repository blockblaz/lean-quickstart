---
# Grandine role: Deploy and manage Grandine nodes
# Converts client-cmds/grandine-cmd.sh logic to Ansible tasks

- name: Extract docker image from client-cmd.sh
  shell: |
    project_root="$(cd '{{ playbook_dir }}/../..' && pwd)"
    grep -E '^\s*docker_image=' "$project_root/client-cmds/grandine-cmd.sh" | head -1 | grep -oE '[a-zA-Z0-9._/-]+:[a-zA-Z0-9._-]+' | head -1
  register: grandine_docker_image_raw
  changed_when: false
  delegate_to: localhost
  run_once: true

- name: Check user-config.yml for docker image override
  shell: |
    project_root="$(cd '{{ playbook_dir }}/../..' && pwd)"
    user_config="$project_root/user-config.yml"
    if [ -f "$user_config" ]; then
      yq eval ".{{ node_name }}.docker_image // \"\"" "$user_config"
    fi
  register: grandine_user_image_raw
  changed_when: false
  delegate_to: localhost
  when: node_name is defined

- name: Set docker image (user-config.yml override or default from client-cmd.sh)
  set_fact:
    grandine_docker_image: "{{ grandine_user_image_raw.stdout | trim if (grandine_user_image_raw.stdout | default('') | trim) not in ['', 'null'] else grandine_docker_image_raw.stdout | trim | default('sifrai/lean:latest') }}"
    deployment_mode: "docker"

- name: Extract node configuration from validator-config.yaml
  shell: |
    yq eval ".validators[] | select(.name == \"{{ node_name }}\") | .{{ item }}" "{{ hostvars['localhost']['local_genesis_dir_path'] }}/validator-config.yaml"
  register: grandine_node_config
  changed_when: false
  delegate_to: localhost
  loop:
    - enrFields.quic
    - metricsPort
    - privkey
    - isAggregator
  when: node_name is defined

- name: Set node ports and aggregator flag
  set_fact:
    grandine_quic_port: "{{ grandine_node_config.results[0].stdout }}"
    grandine_metrics_port: "{{ grandine_node_config.results[1].stdout }}"
    grandine_privkey: "{{ grandine_node_config.results[2].stdout }}"
    grandine_is_aggregator: "{{ 'true' if (grandine_node_config.results[3].stdout | default('') | trim) == 'true' else 'false' }}"
  when: grandine_node_config is defined

- name: Ensure node key file exists
  stat:
    path: "{{ genesis_dir }}/{{ node_name }}.key"
  register: node_key_stat

- name: Debug node key file check
  debug:
    msg: "Checking for key file at {{ genesis_dir }}/{{ node_name }}.key - exists: {{ node_key_stat.stat.exists | default('undefined') }}"

- name: Fail if node key file is missing
  fail:
    msg: "Node key file {{ node_name }}.key not found in {{ genesis_dir }}"
  when: not (node_key_stat.stat.exists | default(false))

- name: Clean node data directory
  file:
    path: "{{ data_dir }}/{{ node_name }}"
    state: absent
  when: clean_data | default(false) | bool

- name: Create node data directory
  file:
    path: "{{ data_dir }}/{{ node_name }}"
    state: directory
    mode: '0755'

- name: Deploy Grandine node using Docker
  block:
    - name: Stop existing Grandine container (if any)
      command: docker rm -f {{ node_name }}
      register: grandine_stop
      failed_when: false
      changed_when: grandine_stop.rc == 0

    - name: Start Grandine container
      command: >-
        docker run -d
        --pull=always
        --name {{ node_name }}
        --restart unless-stopped
        --network host
        {{ '--init --ulimit core=-1 --workdir /data' if (enable_core_dumps | default('') == 'all') or (node_name in (enable_core_dumps | default('')).split(',')) or (node_name.split('_')[0] in (enable_core_dumps | default('')).split(',')) else '' }}
        -v {{ genesis_dir }}:/config:ro
        -v {{ data_dir }}/{{ node_name }}:/data
        {{ grandine_docker_image }}
        --genesis /config/config.yaml
        --validator-registry-path /config/validators.yaml
        --bootnodes /config/nodes.yaml
        --node-id {{ node_name }}
        --node-key /config/{{ node_name }}.key
        --port {{ grandine_quic_port }}
        --address 0.0.0.0
        --hash-sig-key-dir /config/hash-sig-keys
        --metrics
        --http-address 0.0.0.0
        --http-port {{ grandine_metrics_port }}
        {{ '--is-aggregator' if (grandine_is_aggregator | default('false')) == 'true' else '' }}
        {{ ('--checkpoint-sync-url ' + checkpoint_sync_url) if (checkpoint_sync_url is defined and checkpoint_sync_url | length > 0) else '' }}
      register: grandine_container
      changed_when: grandine_container.rc == 0
  when: deployment_mode == 'docker'
