---
# Lantern role: Deploy and manage Lantern nodes
# Converts client-cmds/lantern-cmd.sh logic to Ansible tasks

- name: Extract docker image from client-cmd.sh
  shell: |
    project_root="$(cd '{{ playbook_dir }}/../..' && pwd)"
    grep -E '^\s*docker_image=' "$project_root/client-cmds/lantern-cmd.sh" | head -1 | grep -oE '[a-zA-Z0-9._/-]+:[a-zA-Z0-9._-]+' | head -1
  register: lantern_docker_image_raw
  changed_when: false
  delegate_to: localhost
  run_once: true

- name: Check user-config.yml for docker image override
  shell: |
    project_root="$(cd '{{ playbook_dir }}/../..' && pwd)"
    user_config="$project_root/user-config.yml"
    if [ -f "$user_config" ]; then
      yq eval ".{{ node_name }}.docker_image // \"\"" "$user_config"
    fi
  register: lantern_user_image_raw
  changed_when: false
  delegate_to: localhost
  when: node_name is defined

- name: Set docker image (user-config.yml override or default from client-cmd.sh)
  set_fact:
    lantern_docker_image: "{{ lantern_user_image_raw.stdout | trim if (lantern_user_image_raw.stdout | default('') | trim) not in ['', 'null'] else lantern_docker_image_raw.stdout | trim | default('piertwo/lantern:v0.0.3') }}"
    deployment_mode: "docker"

- name: Extract node configuration from validator-config.yaml
  shell: |
    yq eval ".validators[] | select(.name == \"{{ node_name }}\") | .{{ item }}" "{{ hostvars['localhost']['local_genesis_dir_path'] }}/validator-config.yaml"
  register: lantern_node_config
  changed_when: false
  delegate_to: localhost
  loop:
    - enrFields.quic
    - metricsPort
    - apiPort
    - privkey
    - isAggregator
  when: node_name is defined

- name: Set node ports and aggregator flag
  set_fact:
    lantern_quic_port: "{{ lantern_node_config.results[0].stdout }}"
    lantern_metrics_port: "{{ lantern_node_config.results[1].stdout }}"
    lantern_api_port: "{{ lantern_node_config.results[2].stdout }}"
    lantern_privkey: "{{ lantern_node_config.results[3].stdout }}"
    lantern_is_aggregator: "{{ 'true' if (lantern_node_config.results[4].stdout | default('') | trim) == 'true' else 'false' }}"
  when: lantern_node_config is defined

- name: Ensure node key file exists
  stat:
    path: "{{ genesis_dir }}/{{ node_name }}.key"
  register: node_key_stat

- name: Debug node key file check
  debug:
    msg: "Checking for key file at {{ genesis_dir }}/{{ node_name }}.key - exists: {{ node_key_stat.stat.exists | default('undefined') }}"

- name: Fail if node key file is missing
  fail:
    msg: "Node key file {{ node_name }}.key not found in {{ genesis_dir }}"
  when: not (node_key_stat.stat.exists | default(false))

- name: Create node data directory
  file:
    path: "{{ data_dir }}/{{ node_name }}"
    state: directory
    mode: '0755'

- name: Deploy Lantern node using Docker
  block:
    - name: Stop existing Lantern container (if any)
      command: docker rm -f {{ node_name }}
      register: lantern_stop
      failed_when: false
      changed_when: lantern_stop.rc == 0

    - name: Start Lantern container
      command: >-
        docker run -d
        --pull=always
        --name {{ node_name }}
        --restart unless-stopped
        --network host
        {{ '--init --ulimit core=-1 --workdir /data' if (enable_core_dumps | default('') == 'all') or (node_name in (enable_core_dumps | default('')).split(',')) or (node_name.split('_')[0] in (enable_core_dumps | default('')).split(',')) else '' }}
        -v {{ genesis_dir }}:/config:ro
        -v {{ data_dir }}/{{ node_name }}:/data
        {{ lantern_docker_image }}
        --data-dir /data
        --genesis-config /config/config.yaml
        --validator-registry-path /config/validators.yaml
        --genesis-state /config/genesis.ssz
        --validator-config /config/validator-config.yaml
        --nodes-path /config/nodes.yaml
        --node-id {{ node_name }}
        --node-key-path /config/{{ node_name }}.key
        --listen-address /ip4/0.0.0.0/udp/{{ lantern_quic_port }}/quic-v1
        --metrics-port {{ lantern_metrics_port }}
        --http-port {{ lantern_api_port }}
        --hash-sig-key-dir /config/hash-sig-keys
        {{ '--is-aggregator' if (lantern_is_aggregator | default('false')) == 'true' else '' }}
        {{ ('--checkpoint-sync-url ' + checkpoint_sync_url) if (checkpoint_sync_url is defined and checkpoint_sync_url | length > 0) else '' }}
      register: lantern_container
      changed_when: lantern_container.rc == 0
  when: deployment_mode == 'docker'

