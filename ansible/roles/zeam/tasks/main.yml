---
# Zeam role: Deploy and manage Zeam nodes
# Converts client-cmds/zeam-cmd.sh logic to Ansible tasks

- name: Extract docker image from client-cmd.sh
  shell: |
    # Extract the docker image from node_docker line (find word containing / and :)
    # playbook_dir points to ansible/playbooks, go up two levels to reach project root
    project_root="$(cd '{{ playbook_dir }}/../..' && pwd)"
    script_path="$project_root/client-cmds/zeam-cmd.sh"
    if [ ! -f "$script_path" ]; then
      echo "ERROR: Script not found at $script_path (project_root=$project_root, playbook_dir={{ playbook_dir }})" >&2
      exit 1
    fi
    grep -E '^node_docker=' "$script_path" | head -1 | grep -oE '[a-zA-Z0-9._-]+/[a-zA-Z0-9._-]+:[a-zA-Z0-9._-]+' | head -1
  register: zeam_docker_image_raw
  changed_when: false
  delegate_to: localhost
  run_once: true

- name: Extract deployment mode from client-cmd.sh
  shell: |
    # Extract the value from node_setup line
    # playbook_dir points to ansible/playbooks, go up two levels to reach project root
    project_root="$(cd '{{ playbook_dir }}/../..' && pwd)"
    grep -E '^node_setup=' "$project_root/client-cmds/zeam-cmd.sh" | head -1 | sed -E 's/.*node_setup="([^"]+)".*/\1/'
  register: zeam_deployment_mode_raw
  changed_when: false
  delegate_to: localhost
  run_once: true

- name: Set docker image and deployment mode from client-cmd.sh
  set_fact:
    zeam_docker_image: "{{ zeam_docker_image_raw.stdout | trim | default('blockblaz/zeam:devnet4') }}"
    deployment_mode: "{{ zeam_deployment_mode_raw.stdout | trim | default('docker') }}"
  delegate_to: localhost
  run_once: true

- name: Extract node configuration from validator-config.yaml
  shell: |
    yq eval ".validators[] | select(.name == \"{{ node_name }}\") | .{{ item }}" "{{ local_validator_config_path }}"
  register: node_config
  changed_when: false
  delegate_to: localhost
  loop:
    - metricsPort
    - apiPort
    - privkey
    - isAggregator
  when: node_name is defined

- name: Set node metrics port and aggregator flag
  set_fact:
    zeam_metrics_port: "{{ node_config.results[0].stdout }}"
    zeam_api_port: "{{ node_config.results[1].stdout }}"
    zeam_is_aggregator: "{{ 'true' if (node_config.results[3].stdout | default('') | trim) == 'true' else 'false' }}"
  when: node_config is defined

# Aggregators subscribe only to their committee subnet (validator_index % committee_count).
- name: Compute aggregate subnet id for this aggregator node
  shell: |
    set -e
    idx=$(yq eval '.validators | to_entries | .[] | select(.value.name == "{{ node_name }}") | .key' "{{ local_validator_config_path }}")
    ac=$(yq eval '.config.attestation_committee_count // 1' "{{ local_validator_config_path }}")
    idx=$(echo "$idx" | tr -d '\r\n' | head -1)
    ac=$(echo "$ac" | tr -d '\r\n' | head -1)
    case "$idx" in ''|*[!0-9]*) echo ""; exit 0;; esac
    case "$ac" in ''|*[!0-9]*) ac=1;; esac
    if [ "$ac" -lt 1 ]; then ac=1; fi
    echo $((idx % ac))
  register: zeam_node_subnet_raw
  changed_when: false
  delegate_to: localhost
  when:
    - node_name is defined
    - (zeam_is_aggregator | default('false')) == 'true'

- name: Set aggregate subnet id for aggregator
  set_fact:
    zeam_aggregate_subnet_ids: "{{ zeam_node_subnet_raw.stdout | trim }}"
  when:
    - (zeam_is_aggregator | default('false')) == 'true'
    - zeam_node_subnet_raw is defined
    - zeam_node_subnet_raw.stdout | trim | length > 0

- name: Clear aggregate subnet ids for non-aggregator
  set_fact:
    zeam_aggregate_subnet_ids: ""
  when: (zeam_is_aggregator | default('false')) != 'true'

# Resolve --rayon-threads override for this node. Mirrors the zeam-cmd.sh
# precedence: zeam_rayon_threads_aggregator wins for aggregators, otherwise
# zeam_rayon_threads applies to both roles, otherwise the flag is omitted
# entirely so zeam picks its compiled-in auto-split (zeam #903 / #899).
#
# IMPORTANT: an empty Jinja branch must become "" not None — Ansible's
# default('') filter does NOT coalesce None (only undefined), and None
# stringifies to "None" in the docker command → zeam CLI InvalidCharacter.
- name: Resolve effective rayon-threads override
  set_fact:
    zeam_effective_rayon_threads: "{{ _zeam_rayon_raw | default('', true) | string | trim }}"
  vars:
    _zeam_rayon_raw: >-
      {%- if (zeam_is_aggregator | default('false')) == 'true'
            and (zeam_rayon_threads_aggregator | default('') | string | trim | length) > 0 -%}
      {{ zeam_rayon_threads_aggregator }}
      {%- elif (zeam_rayon_threads | default('') | string | trim | length) > 0 -%}
      {{ zeam_rayon_threads }}
      {%- endif -%}

- name: Ensure node key file exists
  stat:
    path: "{{ genesis_dir }}/{{ node_name }}.key"
  register: node_key_stat

- name: Debug node key file check
  debug:
    msg: "Checking for key file at {{ genesis_dir }}/{{ node_name }}.key - exists: {{ node_key_stat.stat.exists | default('undefined') }}"

- name: Fail if node key file is missing
  fail:
    msg: "Node key file {{ node_name }}.key not found in {{ genesis_dir }}"
  when: not (node_key_stat.stat.exists | default(false))

- name: Create node data directory
  file:
    path: "{{ data_dir }}/{{ node_name }}"
    state: directory
    mode: '0755'

- name: Deploy Zeam node using Docker
  block:
    - name: Pull Zeam docker image
      command: docker pull {{ zeam_docker_image }}
      register: zeam_docker_pull
      changed_when: '"Downloaded newer image" in zeam_docker_pull.stdout'

    - name: Stop existing Zeam container (if any)
      command: docker rm -f {{ node_name }}
      register: docker_stop_result
      failed_when: false
      changed_when: docker_stop_result.rc == 0

    - name: Start Zeam container
      command: >-
        docker run -d
        --pull=always
        --name {{ node_name }}
        --restart {{ docker_container_restart_policy }}
        {{ ('--memory ' + docker_memory_limits.zeam) if (zeam_is_aggregator | default('false')) != 'true' else '' }}
        {{ ('--memory-swap ' + docker_memory_limits.zeam) if (zeam_is_aggregator | default('false')) != 'true' else '' }}
        --network host
        --security-opt seccomp=unconfined
        {{ '--init --ulimit core=-1 --workdir /data' if (enable_core_dumps | default('') == 'all') or (node_name in (enable_core_dumps | default('')).split(',')) or (node_name.split('_')[0] in (enable_core_dumps | default('')).split(',')) else '' }}
        -v {{ genesis_dir }}:/config:ro
        -v {{ data_dir }}/{{ node_name }}:/data
        {{ zeam_docker_image }}
        {{ zeam_global_flags }}
        node
        --custom-genesis /config
        --validator-config /config
        --data-dir /data
        --node-id {{ node_name }}
        --node-key /config/{{ node_name }}.key
        --metrics-enable
        --api-port {{ zeam_api_port }}
        --metrics-port {{ zeam_metrics_port }}
        {{ '--is-aggregator' if (zeam_is_aggregator | default('false')) == 'true' else '' }}
        {{ ('--aggregate-subnet-ids ' + zeam_aggregate_subnet_ids) if (zeam_is_aggregator | default('false')) == 'true' and (zeam_aggregate_subnet_ids | default('') | length > 0) else '' }}
        {{ ('--checkpoint-sync-url ' + checkpoint_sync_url) if (checkpoint_sync_url is defined and checkpoint_sync_url | length > 0) else '' }}
        {{ ('--db-backend ' + zeam_db_backend) if (zeam_db_backend | default('') | length > 0) else '' }}
        {{ '--chain-worker false' if (zeam_chain_worker | default('') | lower in ['off', 'false']) else '' }}
        {{ ('--rayon-threads ' + zeam_effective_rayon_threads) if (zeam_effective_rayon_threads | length > 0) else '' }}
      register: zeam_container_result
      changed_when: zeam_container_result.rc == 0

- name: Deploy Zeam node using binary
  block:
    - name: Check if binary exists
      stat:
        path: "{{ zeam_binary_path }}"
      register: binary_stat

    - name: Fail if binary not found
      fail:
        msg: "Zeam binary not found at {{ zeam_binary_path }}"
      when: not binary_stat.stat.exists

    - name: Create systemd service for Zeam
      template:
        src: zeam.service.j2
        dest: "/etc/systemd/system/zeam-{{ node_name }}.service"
        mode: '0644'
      become: yes
      when: ansible_connection != 'local'

    - name: Start and enable Zeam service
      systemd:
        name: "zeam-{{ node_name }}"
        state: started
        enabled: yes
        daemon_reload: yes
      become: yes
      when: ansible_connection != 'local'
  when: deployment_mode == 'binary'
