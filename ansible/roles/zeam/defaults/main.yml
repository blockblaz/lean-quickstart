---
# Default variables for zeam role
# Note: These are fallback defaults. Actual values are extracted from client-cmds/zeam-cmd.sh
# in the tasks/main.yml file. These defaults are used if extraction fails.

zeam_docker_image: "blockblaz/zeam:devnet4"
zeam_binary_path: "{{ playbook_dir }}/../zig-out/bin/zeam"
deployment_mode: docker  # docker or binary

# Global zeam CLI flags before `node`. Empty by default: published devnet4 image lacks these options.
# Override when using a zeam build that supports them, e.g. "--console-log-level debug"
zeam_global_flags: ""

# On-disk store for zeam node (requires zeam with --db-backend). Keep in sync with client-cmds/zeam-cmd.sh.
zeam_db_backend: "lmdb"

# These should be passed from the playbook
node_name: ""
genesis_dir: ""
data_dir: ""
validator_config: "genesis_bootnode"

