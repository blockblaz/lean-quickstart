---
# Default variables for ream role
# Note: These are fallback defaults. Actual values are extracted from client-cmds/ream-cmd.sh
# in the tasks/main.yml file. These defaults are used if extraction fails.

ream_docker_image: "snaiyer1/ream:latest-devnet5"
deployment_mode: docker  # docker or binary

# Number of attestation committees (subnets). Extracted from .config.attestation_committee_count
# in validator-config.yaml at runtime. Override via -e ream_attestation_committee_count=N if needed.
ream_attestation_committee_count: 1

# These should be passed from the playbook
node_name: ""
genesis_dir: ""
data_dir: ""

