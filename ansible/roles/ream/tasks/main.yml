---
# Ream role: Deploy and manage Ream nodes
# Converts client-cmds/ream-cmd.sh logic to Ansible tasks

- name: Extract docker image from client-cmd.sh
  shell: |
    project_root="$(cd '{{ playbook_dir }}/../..' && pwd)"
    script_path="$project_root/client-cmds/ream-cmd.sh"
    if [ ! -f "$script_path" ]; then
      echo "ERROR: Script not found at $script_path (project_root=$project_root, playbook_dir={{ playbook_dir }})" >&2
      exit 1
    fi
    grep -E '^node_docker=' "$script_path" | head -1 | grep -oE '[a-zA-Z0-9._/-]+:[a-zA-Z0-9._-]+' | head -1
  register: ream_docker_image_raw
  changed_when: false
  delegate_to: localhost
  run_once: true

- name: Extract deployment mode from client-cmd.sh
  shell: |
    project_root="$(cd '{{ playbook_dir }}/../..' && pwd)"
    grep -E '^node_setup=' "$project_root/client-cmds/ream-cmd.sh" | head -1 | sed -E 's/.*node_setup="([^"]+)".*/\1/'
  register: ream_deployment_mode_raw
  changed_when: false
  delegate_to: localhost
  run_once: true

- name: Set docker image and deployment mode from client-cmd.sh
  set_fact:
    ream_docker_image: "{{ ream_docker_image_raw.stdout | trim | default('ghcr.io/reamlabs/ream:latest-devnet4') }}"
    deployment_mode: "{{ ream_deployment_mode_raw.stdout | trim | default('docker') }}"
  delegate_to: localhost
  run_once: true

- name: Extract node configuration from validator-config.yaml
  shell: |
    yq eval ".validators[] | select(.name == \"{{ node_name }}\") | .{{ item }}" "{{ local_validator_config_path }}"
  register: ream_node_config
  changed_when: false
  delegate_to: localhost
  loop:
    - enrFields.quic
    - metricsPort
    - apiPort
    - isAggregator
  when: node_name is defined

- name: Set node ports and aggregator flag
  set_fact:
    ream_quic_port: "{{ ream_node_config.results[0].stdout }}"
    ream_metrics_port: "{{ ream_node_config.results[1].stdout }}"
    ream_api_port: "{{ ream_node_config.results[2].stdout }}"
    ream_is_aggregator: "{{ 'true' if (ream_node_config.results[3].stdout | default('') | trim) == 'true' else 'false' }}"
  when: ream_node_config is defined

# Read attestation_committee_count from the top-level config block.
# Mirrors the same logic used in the zeam role so both clients get the same subnet count.
- name: Compute attestation committee count from validator-config.yaml
  shell: |
    set -e
    ac=$(yq eval '.config.attestation_committee_count // 1' "{{ local_validator_config_path }}")
    ac=$(echo "$ac" | tr -d '\r\n' | head -1)
    case "$ac" in ''|*[!0-9]*) ac=1;; esac
    if [ "$ac" -lt 1 ]; then ac=1; fi
    echo "$ac"
  register: ream_attestation_committee_count_raw
  changed_when: false
  delegate_to: localhost
  run_once: true

- name: Set attestation committee count
  set_fact:
    ream_attestation_committee_count: "{{ ream_attestation_committee_count_raw.stdout | trim | int }}"
  run_once: true

# Aggregators subscribe only to their committee subnet (validator_index % committee_count).
# Mirrors parse-vc.sh / ream-cmd.sh and the zeam/ethlambda ansible roles.
- name: Compute aggregate subnet id for this aggregator node
  shell: |
    set -e
    idx=$(yq eval '.validators | to_entries | .[] | select(.value.name == "{{ node_name }}") | .key' "{{ local_validator_config_path }}")
    ac=$(yq eval '.config.attestation_committee_count // 1' "{{ local_validator_config_path }}")
    idx=$(echo "$idx" | tr -d '\r\n' | head -1)
    ac=$(echo "$ac" | tr -d '\r\n' | head -1)
    case "$idx" in ''|*[!0-9]*) echo ""; exit 0;; esac
    case "$ac" in ''|*[!0-9]*) ac=1;; esac
    if [ "$ac" -lt 1 ]; then ac=1; fi
    echo $((idx % ac))
  register: ream_node_subnet_raw
  changed_when: false
  delegate_to: localhost
  when:
    - node_name is defined
    - (ream_is_aggregator | default('false')) == 'true'

- name: Set aggregate subnet id for aggregator
  set_fact:
    ream_aggregate_subnet_ids: "{{ ream_node_subnet_raw.stdout | trim }}"
  when:
    - (ream_is_aggregator | default('false')) == 'true'
    - ream_node_subnet_raw is defined
    - ream_node_subnet_raw.stdout | trim | length > 0

- name: Clear aggregate subnet ids for non-aggregator
  set_fact:
    ream_aggregate_subnet_ids: ""
  when: (ream_is_aggregator | default('false')) != 'true'

- name: Ensure node key file exists
  stat:
    path: "{{ genesis_dir }}/{{ node_name }}.key"
  register: node_key_stat

- name: Debug node key file check
  debug:
    msg: "Checking for key file at {{ genesis_dir }}/{{ node_name }}.key - exists: {{ node_key_stat.stat.exists | default('undefined') }}"

- name: Fail if node key file is missing
  fail:
    msg: "Node key file {{ node_name }}.key not found in {{ genesis_dir }}"
  when: not (node_key_stat.stat.exists | default(false))

- name: Create node data directory
  file:
    path: "{{ data_dir }}/{{ node_name }}"
    state: directory
    mode: '0755'

- name: Deploy Ream node using Docker
  block:
    - name: Pull Ream docker image
      command: docker pull {{ ream_docker_image }}
      register: ream_docker_pull
      changed_when: '"Downloaded newer image" in ream_docker_pull.stdout'

    - name: Stop existing Ream container (if any)
      command: docker rm -f {{ node_name }}
      register: ream_stop
      failed_when: false
      changed_when: ream_stop.rc == 0

    - name: Start Ream container
      command: >-
        docker run -d
        --pull=always
        --name {{ node_name }}
        --restart {{ docker_container_restart_policy }}
        --network host
        {{ '--init --ulimit core=-1 --workdir /data' if (enable_core_dumps | default('') == 'all') or (node_name in (enable_core_dumps | default('')).split(',')) or (node_name.split('_')[0] in (enable_core_dumps | default('')).split(',')) else '' }}
        -v {{ genesis_dir }}:/config:ro
        -v {{ data_dir }}/{{ node_name }}:/data
        {{ ream_docker_image }}
        --data-dir /data
        lean_node
        --network /config/config.yaml
        --validator-registry-path /config/annotated_validators.yaml
        --bootnodes /config/nodes.yaml
        --node-id {{ node_name }}
        --node-key /config/{{ node_name }}.key
        --socket-port {{ ream_quic_port }}
        --metrics
        --metrics-address 0.0.0.0
        --metrics-port {{ ream_metrics_port }}
        --http-address 0.0.0.0
        --http-port {{ ream_api_port }}
        --attestation-committee-count {{ ream_attestation_committee_count }}
        {{ '--is-aggregator' if (ream_is_aggregator | default('false')) == 'true' else '' }}
        {{ ('--aggregate-subnet-ids ' + ream_aggregate_subnet_ids) if (ream_is_aggregator | default('false')) == 'true' and (ream_aggregate_subnet_ids | default('') | length > 0) else '' }}
        {{ ('--checkpoint-sync-url ' + checkpoint_sync_url) if (checkpoint_sync_url is defined and checkpoint_sync_url | length > 0) else '' }}
      register: ream_container
      changed_when: ream_container.rc == 0
  when: deployment_mode == 'docker'
