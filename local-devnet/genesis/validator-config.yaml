# Local devnet: 10 zeam nodes across 2 attestation subnets on 127.0.0.1.
#
# Shuffle = roundrobin, validator_index = position in `validators` list.
# Subnet membership = validator_index % attestation_committee_count (2):
#   subnet 0: zeam_0, zeam_2, zeam_4, zeam_6, zeam_8
#   subnet 1: zeam_1, zeam_3, zeam_5, zeam_7, zeam_9
#
# Aggregators (one per subnet): zeam_0, zeam_1.
# Ports: QUIC 9001–9010, metrics 8081–8090, API 5051–5060.
shuffle: roundrobin
deployment_mode: local
config:
  activeEpoch: 18
  keyType: "hash-sig"
  attestation_committee_count: 2
validators:
