# Single-subnet local devnet: zeam + ethlambda (aggregators), lantern (validator).
#
# Shuffle = roundrobin, validator_index = position in `validators` list.
# attestation_committee_count = 1 — all validators on subnet 0.
#   index 0  zeam_0      -> subnet 0 (aggregator)
#   index 1  ethlambda_0 -> subnet 0 (aggregator)
#   index 2  lantern_0   -> subnet 0 (validator)
shuffle: roundrobin
deployment_mode: local
config:
  activeEpoch: 18
  keyType: "hash-sig"
  attestation_committee_count: 1
validators:
  - name: "zeam_0"
    privkey: "bdf953adc161873ba026330c56450453f582e3c4ee6cb713644794bcfdd85fe5"
    enrFields:
      ip: "127.0.0.1"
      quic: 9001
    metricsPort: 8081
    apiPort: 5051
    isAggregator: true
    count: 1
  - name: "ethlambda_0"
    privkey: "299550529a79bc2dce003747c52fb0639465c893e00b0440ac66144d625e066a"
    enrFields:
      ip: "127.0.0.1"
      quic: 9003
    metricsPort: 8083
    apiPort: 5053
    isAggregator: true
    count: 1
  - name: "lantern_0"
    privkey: "af27950128b49cda7e7bc9fcb7b0270f7a3945aa7543326f3bfdbd57d2a97a32"
    enrFields:
      ip: "127.0.0.1"
      quic: 9005
    metricsPort: 8085
    apiPort: 5055
    isAggregator: false
    count: 1
