shuffle: roundrobin
# Deployment mode: 'local' for local deployment, 'ansible' for remote deployment via Ansible
deployment_mode: local
config:
  activeEpoch: 18
  keyType: "hash-sig"
  # 2 subnets; committee = validator index % attestation_committee_count.
  # List order interleaves zeam / ethlambda so subnet 0 is all zeam, subnet 1 all ethlambda.
  attestation_committee_count: 2
